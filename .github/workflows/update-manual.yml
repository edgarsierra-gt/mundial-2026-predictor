name: Update World Cup Model

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout predictor repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m ruff check .
          python -m pytest

      - name: Run update pipeline
        run: |
          python scripts/update_all.py --skip-build

      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/processed data/outputs data/frozen
          git commit -m "Update World Cup model outputs" || echo "No changes to commit"
          git push
